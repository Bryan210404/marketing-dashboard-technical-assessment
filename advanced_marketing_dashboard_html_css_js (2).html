<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Elite Marketing Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Inter',sans-serif;background:#f4f6fb}
.app{display:flex;height:100vh}

.sidebar{width:260px;background:linear-gradient(180deg,#2c2c54,#1c1c3a);color:#fff;padding:20px}
.logo{font-size:22px;font-weight:700;margin-bottom:30px}
.menu-title{font-size:11px;opacity:.6;margin:20px 0 10px}
.menu-item{padding:10px;border-radius:8px;cursor:pointer;transition:.2s}
.menu-item:hover{background:rgba(255,255,255,.1)}
.menu-item.active{background:#6c5ce7}

.main{flex:1;padding:20px;overflow:auto}

/* FILTER BUTTONS */
.topbar{display:flex;gap:10px;margin-bottom:20px}
.filter{
background:#fff;
padding:10px 16px;
border-radius:999px;
cursor:pointer;
font-size:13px;
box-shadow:0 2px 8px rgba(0,0,0,.08);
transition:.2s;
border:1px solid transparent;
}
.filter:hover{transform:translateY(-2px)}
.filter.active{
background:#6c5ce7;
color:#fff;
border:1px solid #6c5ce7;
}

.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:15px}
.card{
background:#fff;
padding:16px;
border-radius:16px;
box-shadow:0 8px 20px rgba(0,0,0,.06);
transition:.2s
}
.card:hover{transform:translateY(-3px)}
.card h4{margin:0;font-size:12px;opacity:.6}
.card h2{margin:6px 0}
.up{color:#00b894}.down{color:#d63031}

.grid{display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-top:20px}
.panel{background:#fff;border-radius:16px;padding:18px;box-shadow:0 8px 20px rgba(0,0,0,.06)}
.panel h3{margin:0 0 10px}

.tables{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px}

.hidden{display:none}

</style>
</head>
<body>

<div class="app">

<div class="sidebar">
<div class="logo">improvado</div>

<div class="menu-title">Marketing</div>
<div class="menu-item active" onclick="showView('summary', this)">Executive Summary</div>
<div class="menu-item" onclick="showView('channels', this)">Channel Performance</div>
<div class="menu-item" onclick="showView('campaigns', this)">Campaigns</div>
</div>

<div class="main">

<div id="summaryView">

<div class="topbar">
<div class="filter active" onclick="selectFilter(this,'all')">All</div>
<div class="filter" onclick="selectFilter(this,'programmatic')">Programmatic</div>
<div class="filter" onclick="selectFilter(this,'search')">Search</div>
<div class="filter" onclick="selectFilter(this,'social')">Social</div>
</div>

<div class="kpis">
<div class="card"><h4>Spend</h4><h2 id="spend"></h2><canvas id="k1"></canvas></div>
<div class="card"><h4>CTR</h4><h2 id="ctr"></h2><canvas id="k2"></canvas></div>
<div class="card"><h4>Conversions</h4><h2 id="conv"></h2><canvas id="k3"></canvas></div>
<div class="card"><h4>CPC</h4><h2 id="cpc"></h2><canvas id="k4"></canvas></div>
</div>

<div class="grid">
<div class="panel"><h3>Channel Trends</h3><canvas id="mainChart"></canvas></div>
<div class="panel">
<h3>Channel Performance</h3>
<table id="channelTable"></table>
</div>
</div>

<div class="tables">
<div class="panel"><h3>Data Source</h3><table id="sourceTable"></table></div>
<div class="panel"><h3>Campaigns</h3><table id="campaignTable"></table></div>
</div>

</div>

<div id="channelsView" class="hidden"><div class="panel"><h3>Channel Deep Dive</h3></div></div>
<div id="campaignsView" class="hidden"><div class="panel"><h3>Campaign Deep Dive</h3></div></div>

</div>
</div>

<script>

const fullData={
all:{spend:36,ctr:10.5,conv:791,cpc:4,data:[6,5,7,4,9,5,7,12,8,5,6,7]},
programmatic:{spend:18,ctr:11.2,conv:320,cpc:3,data:[6,5,7,4,9,5,7,12,8,5,6,7]},
search:{spend:10,ctr:10.7,conv:280,cpc:4.5,data:[3,6,8,3,4,3,4,5,3,8,4,7]},
social:{spend:8,ctr:9.8,conv:191,cpc:5,data:[1,2,3,4,3,4,5,5,1,4,2,3]}
}

let current='all'

const chart=new Chart(document.getElementById('mainChart'),{
type:'line',
data:{labels:['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],datasets:[{label:'Channel',data:fullData.all.data,borderColor:'#6c5ce7',tension:.4}]}
})

function updateUI(){
const d=fullData[current]

document.getElementById('spend').innerText='$'+d.spend+'M'
document.getElementById('ctr').innerText=d.ctr+'%'
document.getElementById('conv').innerText=d.conv
document.getElementById('cpc').innerText='$'+d.cpc+'K'

chart.data.datasets[0].data=d.data
chart.update()

// tables
channelTable.innerHTML=`<tr><th>Channel</th><th>CTR</th></tr>
<tr><td>${current}</td><td>${d.ctr}%</td></tr>`

sourceTable.innerHTML=`<tr><th>Source</th><th>CTR</th></tr>
<tr><td>Google</td><td>${d.ctr}%</td></tr>
<tr><td>Facebook</td><td>${(d.ctr-0.3).toFixed(2)}%</td></tr>`

campaignTable.innerHTML=`<tr><th>Campaign</th><th>CTR</th></tr>
<tr><td>Retargeting</td><td>${(d.ctr+1).toFixed(2)}%</td></tr>
<tr><td>Awareness</td><td>${(d.ctr-1).toFixed(2)}%</td></tr>`
}

function selectFilter(el,ch){
document.querySelectorAll('.filter').forEach(f=>f.classList.remove('active'))
el.classList.add('active')
current=ch
updateUI()
}

function showView(view,el){
document.querySelectorAll('.menu-item').forEach(i=>i.classList.remove('active'))
el.classList.add('active')
summaryView.classList.add('hidden')
channelsView.classList.add('hidden')
campaignsView.classList.add('hidden')
window[view+'View'].classList.remove('hidden')
}

function spark(id){
new Chart(document.getElementById(id),{
type:'line',data:{labels:[1,2,3,4,5,6],datasets:[{data:[10,20,15,30,25,35],borderColor:'#6c5ce7',tension:.4}]},options:{plugins:{legend:{display:false}},scales:{x:{display:false},y:{display:false}}}
})
}
['k1','k2','k3','k4'].forEach(spark)

updateUI()

</script>

</body>
</html>
